<!-- ============================================================
     CARICAMENTO MODULI
     1) core.js          → stato, Supabase/auth, helper, render()
     2) moduli BASE      → hub (poi: cal, notes, clients, emps, notif)
     3) moduli EXTRA     → macchine, zone (su misura per ptek)
     L'ordine: il core per primo; i moduli dopo (il boot del core è
     async, quindi tutti i moduli sono pronti prima del primo render).
     ============================================================ -->

<!-- config backend condiviso (multi-tenant) — DEVE precedere core.js -->
<script src="./core/config.js"></script>
<!-- core -->
<script src="./core/core.js"></script>

<!-- moduli BASE (l'app base: ogni azienda ce li ha) -->
<script src="./modules-base/hub/hub.js"></script>
<script src="./modules-base/cal/cal.js"></script>
<script src="./modules-base/notes/notes.js"></script>
<script src="./modules-base/notif/notif.js"></script>
<script src="./modules-base/clients/clients.js"></script>
<script src="./modules-base/emps/emps.js"></script>

<!-- moduli EXTRA (su misura ptek: un'azienda li attiva se le servono) -->
<script src="./modules-extra/man/man.js"></script>
<script src="./modules-extra/pellet/pellet.js"></script>
<script src="./modules-extra/sites/sites.js"></script>
<script src="./modules-extra/conti/conti.js"></script>
<script src="./macchine.js"></script>
<script src="./vendor/leaflet.js"></script>
<script src="./zone-data.js"></script>
<script src="./zone.js"></script>
</body>
</html>
