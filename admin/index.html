<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modula · Regia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0E1110;--bg2:#161A18;--card:#1B201D;--line:#2A312D;--line2:#374039;--t1:#EAF0EC;--t2:#9BA8A0;--t3:#6B776F;--ac:#34D399;--ac2:#10B981;--amber:#FBBF24;--red:#F87171}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:920px;margin:0 auto;padding:22px 18px 80px}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:700;font-size:19px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--ac)}
  .sub{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--t3);border:1px solid var(--line2);border-radius:5px;padding:2px 6px;text-transform:uppercase}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px}
  .muted{color:var(--t2)}.tiny{font-size:12.5px;color:var(--t3)}
  label{display:block;font-size:12px;color:var(--t2);margin-bottom:5px}
  input,select{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;color:var(--t1);font:inherit;font-size:14px;padding:10px 12px;outline:none}
  input:focus,select:focus{border-color:var(--ac)}
  input::placeholder{color:var(--t3)}
  .mono{font-family:'JetBrains Mono';letter-spacing:.5px}
  button{font:inherit;font-weight:600;cursor:pointer;border-radius:9px;border:1px solid var(--line2);background:transparent;color:var(--t1);padding:10px 16px;transition:.12s}
  button:hover{border-color:var(--ac);color:var(--ac)}
  button.pri{background:var(--ac);border-color:var(--ac);color:#04130D}
  button.pri:hover{background:var(--ac2);border-color:var(--ac2);color:#04130D}
  button.sm{padding:6px 11px;font-size:13px;border-radius:8px}
  button:disabled{opacity:.5;cursor:default}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .chip{font-size:12.5px;padding:6px 11px;border-radius:8px;border:1px solid var(--line2);color:var(--t2);cursor:pointer;user-select:none}
  .chip.on{background:rgba(52,211,153,.13);border-color:var(--ac);color:var(--ac)}
  .chip.lock{opacity:.6;cursor:default}
  .err{color:var(--red);font-size:13px;min-height:18px;margin:6px 0}
  .ok{color:var(--ac);font-size:13px}
  .tenant{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--bg2)}
  .tenant h3{font-size:16px;display:flex;align-items:center;gap:8px}
  .pill{font-size:11px;font-family:'JetBrains Mono';padding:2px 7px;border-radius:6px;border:1px solid var(--line2);color:var(--t3)}
  .pill.on{color:var(--ac);border-color:var(--ac)}
  .pill.off{color:var(--amber);border-color:var(--amber)}
  .codebox{background:#04130D;border:1px solid var(--ac);border-radius:9px;padding:10px 13px;font-family:'JetBrains Mono';color:var(--ac);display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}
  .stats{display:flex;flex-wrap:wrap;gap:14px;margin:10px 0 2px;font-size:13px;color:var(--t2)}
  .adminbox{margin-top:16px;padding:14px 16px;background:var(--bg);border:1px solid var(--line);border-radius:11px}
  details.tenant{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:var(--bg2);padding:0;overflow:hidden}
  details.tenant>summary{list-style:none;cursor:pointer;padding:13px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  details.tenant>summary::-webkit-details-marker{display:none}
  details.tenant>summary::before{content:'▸';color:var(--t3);font-size:12px;transition:.15s;flex:0 0 auto}
  details.tenant[open]>summary::before{transform:rotate(90deg)}
  details.tenant>summary:hover{background:rgba(255,255,255,.03)}
  details.tenant[open]>summary{border-bottom:1px solid var(--line)}
  .tname{font-family:'Space Grotesk';font-weight:600;font-size:16px}
  .sum-stat{margin-left:auto;color:var(--t2)}
  .tbody{padding:14px 16px 16px}
  details.newcard{border:1px dashed var(--line2);border-radius:12px;background:transparent;margin-top:6px}
  details.newcard>summary{list-style:none;cursor:pointer;padding:13px 16px;font-weight:600;color:var(--ac)}
  details.newcard>summary::-webkit-details-marker{display:none}
  details.newcard[open]>summary{color:var(--t2)}
  #search{font-size:14px;margin:6px 0 14px}
  details.modedit{margin:14px 0;border:1px solid var(--line);border-radius:10px;background:var(--bg)}
  details.modedit>summary{list-style:none;cursor:pointer;padding:10px 12px;font-size:13.5px;color:var(--t1)}
  details.modedit>summary::-webkit-details-marker{display:none}
  details.modedit>summary::before{content:'▸';color:var(--t3);margin-right:7px;font-size:11px}
  details.modedit[open]>summary::before{content:'▾'}
  details.modedit[open]>summary{border-bottom:1px solid var(--line)}
  details.modedit>div{padding:4px 12px 12px}
  .paste-box{background:var(--bg);border:1px dashed var(--ac);border-radius:10px;padding:12px 14px;margin-bottom:14px}
  .paste-box textarea{width:100%;min-height:64px;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;color:var(--t1);font-family:'JetBrains Mono';font-size:12.5px;padding:9px 11px;resize:vertical}
  .center{min-height:72vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .lbox{width:100%;max-width:360px}
  .link{color:var(--t2);font-size:13px;text-align:center;margin-top:14px;cursor:pointer}
  .link:hover{color:var(--ac)}
  a{color:var(--ac)}
  .sec{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin:26px 0 10px;font-weight:600}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script src="../core/config.js"></script>
<script>
const CFG=window.MODULA_CONFIG||{};
const DEMO=/^__/.test(CFG.SUPABASE_URL||'__');
const sb=DEMO?null:window.supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY);
const $=s=>document.querySelector(s);
const app=$('#app');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slugify=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');

/* catalogo moduli: hub e notif sempre attivi (base imprescindibile) */
const MODULES=[
  {id:'hub',label:'Hub',lock:true},{id:'notif',label:'Notifiche',lock:true},
  {id:'cal',label:'Calendario'},{id:'notes',label:'Note'},
  {id:'clients',label:'Clienti'},{id:'emps',label:'Personale'},
  {id:'man',label:'Manutenzioni'},{id:'pellet',label:'Pellet'},{id:'sites',label:'Cantieri'},
  {id:'macchine',label:'Macchine'},{id:'zone',label:'Zone'},{id:'conti',label:'Conti'},
];
const mLabel=id=>{const m=MODULES.find(x=>x.id===id);return m?m.label:id;};
const APP_URL=location.origin+location.pathname.replace(/admin\/.*/,'')+'app.html';

let session=null, isAdmin=false, authBusy=false;

function shell(inner){app.innerHTML=`<header><div class="brand"><span class="dot"></span>Modula <span class="sub">Regia</span></div><div class="row">${session?`<button class="sm" onclick="doLogout()">Esci</button>`:''}</div></header>${inner}`;}

/* ---------- AUTH ---------- */
function viewLogin(mode){
  const reg=mode==='signup';
  shell(`<div class="center"><div class="lbox">
    <h2 style="text-align:center;margin-bottom:6px">${reg?'Crea il tuo accesso':'Regia Modula'}</h2>
    <div class="tiny" style="text-align:center;margin-bottom:20px">${reg?'Sarà il tuo account super-admin':'Accedi per gestire le aziende'}</div>
    <div class="card">
      <label>Email</label><input id="em" type="email" autocomplete="email" placeholder="tu@email.it">
      <div style="height:10px"></div>
      <label>Password</label><input id="pw" type="password" autocomplete="${reg?'new-password':'current-password'}" placeholder="min 6 caratteri" onkeydown="if(event.key==='Enter')${reg?'doSignup()':'doLogin()'}">
      <div class="err" id="er"></div>
      <button class="pri" style="width:100%" onclick="${reg?'doSignup()':'doLogin()'}">${reg?'Crea account':'Entra'}</button>
    </div>
    <div class="link" onclick="viewLogin('${reg?'login':'signup'}')">${reg?'← Ho già un account':'Prima volta? Crea l\'accesso →'}</div>
  </div></div>`);
  setTimeout(()=>{const f=$('#em');if(f)f.focus();},60);
}
function aerr(m){const e=$('#er');if(e)e.textContent=m;authBusy=false;}
async function doLogin(){
  if(authBusy)return;authBusy=true;
  const email=$('#em').value.trim(),pw=$('#pw').value;
  if(!email||!pw)return aerr('Email e password');
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error)return aerr(error.message.includes('Invalid')?'Email o password sbagliate':error.message);
  authBusy=false;boot();
}
async function doSignup(){
  if(authBusy)return;authBusy=true;
  const email=$('#em').value.trim(),pw=$('#pw').value;
  if(!email||pw.length<6)return aerr('Email valida e password ≥ 6');
  const{data,error}=await sb.auth.signUp({email,password:pw});
  if(error)return aerr(error.message.includes('already')?'Email già registrata — torna al login':error.message);
  authBusy=false;
  if(!data.session){shell(`<div class="center"><div class="lbox card" style="text-align:center"><h3>Controlla l'email \u{1F4E7}</h3><p class="muted" style="margin:10px 0">Ti ho mandato un link di conferma. Cliccalo, poi torna qui e accedi.</p><p class="tiny">Per evitare la conferma email (ok se sei solo tu): Supabase → Authentication → Sign In/Up → disattiva “Confirm email”.</p><button style="margin-top:12px" onclick="viewLogin('login')">← Vai al login</button></div></div>`);return;}
  boot();
}
async function doLogout(){await sb.auth.signOut();session=null;isAdmin=false;boot();}

/* ---------- NON super-admin: offri il bootstrap ---------- */
function viewClaim(){
  shell(`<div class="center"><div class="lbox card" style="text-align:center">
    <h3>Diventa super-admin \u{1F451}</h3>
    <p class="muted" style="margin:10px 0">Il tuo account non è ancora super-admin. Se sei il primo (la piattaforma è nuova), prendine il controllo qui.</p>
    <div class="err" id="er"></div>
    <button class="pri" onclick="doClaim()">Prendi il controllo</button>
    <div class="link" onclick="doLogout()">Esci</div>
  </div></div>`);
}
async function doClaim(){
  const{data,error}=await sb.rpc('bootstrap_super_admin');
  if(error)return $('#er').textContent=error.message;
  if(!data)return $('#er').textContent='Esiste già un super-admin — questo account non può diventarlo.';
  boot();
}

/* ---------- DASHBOARD ---------- */
async function viewDash(){
  shell(`<div id="dash"><div class="muted">Carico le aziende…</div></div>`);
  const{data:tenants,error}=await sb.from('tenants').select('*').order('created_at',{ascending:false});
  if(error){$('#dash').innerHTML=`<div class="card err">${esc(error.message)}</div>`;return;}
  // codici invito ancora DA USARE (titolare + dipendenti non ancora registrati), per tenant
  const{data:pend}=await sb.from('employees').select('tenant_id,name,invite_code,is_owner').not('invite_code','is',null);
  const codesByTenant={};
  (pend||[]).forEach(e=>{(codesByTenant[e.tenant_id]=codesByTenant[e.tenant_id]||[]).push(e);});
  // gestione cliente (contatti/piano/pagamenti) — tabella privata solo super-admin
  const{data:adm}=await sb.from('tenant_admin').select('*');
  const admById={}; (adm||[]).forEach(a=>{admById[a.tenant_id]=a;});
  // statistiche d'uso per azienda
  const{data:ov}=await sb.rpc('tenant_overview');
  const ovById={}; (ov||[]).forEach(o=>{ovById[o.tenant_id]=o;});
  const list=(tenants||[]).map(t=>tenantCard(t,codesByTenant[t.id]||[],admById[t.id]||{},ovById[t.id]||{})).join('')||`<div class="card muted">Nessuna azienda ancora. Creane una qui sotto ↓</div>`;
  $('#dash').innerHTML=`
    <div class="row" style="justify-content:space-between;align-items:baseline">
      <h2>Aziende <span class="muted" style="font-size:15px">(${(tenants||[]).length})</span></h2>
      <span class="tiny">App cliente: <a href="${APP_URL}" target="_blank">${esc(APP_URL)}</a></span>
    </div>
    <input id="search" placeholder="🔍 Cerca azienda per nome o slug…" oninput="filterTenants(this.value)">
    <div id="tlist">${list}</div>
    <div id="noresult" class="card muted" style="display:none">Nessuna azienda trovata.</div>
    <div class="sec">Aggiungi</div>
    <details class="newcard"><summary>+ Nuova azienda</summary>${newTenantForm()}</details>`;
}
function fmtDate(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('it-CH',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return '—';}}
function tenantCard(t,codes,adm,ov){
  codes=codes||[];adm=adm||{};ov=ov||{};
  const mods=Array.isArray(t.modules)?t.modules:[];
  const chipFor=m=>`<span class="chip ${mods.includes(m.id)?'on':''} ${m.lock?'lock':''}" data-t="${t.id}" data-m="${m.id}" ${m.lock?'':`onclick="toggleMod(this)"`}>${esc(m.label)}</span>`;
  const active=MODULES.filter(m=>mods.includes(m.id));
  const inactive=MODULES.filter(m=>!mods.includes(m.id));
  const chipsActive=active.map(chipFor).join('');
  const chipsInactive=inactive.map(chipFor).join('');
  const codeRows = codes.length
    ? codes.map(c=>`<div class="codebox"><span>${esc(c.name)}${c.is_owner?' · titolare':''}: <b>${esc(c.invite_code)}</b></span><button class="sm" onclick="navigator.clipboard.writeText('${esc(c.invite_code)}')">copia</button></div>`).join('')
    : `<div class="tiny" style="margin-top:6px">Tutti gli inviti sono già stati usati (account attivi).</div>`;
  const ownerCode=(codes.find(c=>c.is_owner)||{}).invite_code||'';
  const inviteMsg=ownerCode?`Ciao, ecco l'accesso alla tua app ${t.name}:\n${APP_URL}\nCodice invito: ${ownerCode}\nApri il link, registrati e inserisci il codice.`:'';
  const pay=adm.payment_status||'in_regola';
  const opt=(v,l)=>`<option value="${v}" ${pay===v?'selected':''}>${l}</option>`;
  return `<details class="tenant" id="t-${t.id}" data-search="${esc((t.name+' '+t.slug).toLowerCase())}">
    <summary>
      <span class="tname">${esc(t.name)}</span>
      <span class="pill">${esc(t.slug)}</span>
      <span class="pill ${t.active?'on':'off'}">${t.active?'attiva':'sospesa'}</span>
      <span class="pill ${pay==='in_regola'?'on':'off'}">${pay==='in_regola'?'pag. ok':esc(pay)}</span>
      <span class="sum-stat tiny">👤 ${ov.employees_active!=null?ov.employees_active:'?'} · 📇 ${ov.clients_count!=null?ov.clients_count:'?'}</span>
    </summary>
    <div class="tbody">
    <div class="stats">
      <span>👤 ${ov.employees_active!=null?ov.employees_active:'?'} dipendenti <span class="tiny">(${ov.employees_registered||0} registrati)</span></span>
      <span>📇 ${ov.clients_count!=null?ov.clients_count:'?'} clienti</span>
      <span>🕑 ultima attività: ${fmtDate(ov.last_activity)}</span>
    </div>

    <details class="modedit">
      <summary>🧩 Moduli — <b>${active.length}</b> attivi · modifica</summary>
      <div>
        <div class="tiny" style="margin:8px 0 4px">Attivi — clicca per spegnere</div>
        <div class="modchips">${chipsActive}</div>
        <div class="tiny" style="margin:14px 0 4px">Da attivare — clicca per accendere</div>
        <div class="modchips">${chipsInactive||'<span class="tiny">Tutti i moduli sono già attivi.</span>'}</div>
        <div class="row" style="margin-top:12px;align-items:center;gap:8px">
          <button class="sm pri" onclick="saveMods('${t.id}')">Salva moduli</button>
          <span class="ok" id="ok-${t.id}"></span>
        </div>
      </div>
    </details>

    <div class="tiny" style="margin:14px 0 4px">Codici invito da usare</div>
    ${codeRows}
    ${inviteMsg?`<button class="sm" style="margin-top:8px" onclick="copyEl('msg-${t.id}')">📋 Copia messaggio d'invito pronto</button><textarea id="msg-${t.id}" style="position:absolute;left:-9999px">${esc(inviteMsg)}</textarea>`:''}

    <div class="adminbox">
      <div class="sec" style="margin:0 0 10px">Gestione cliente <span class="tiny">(privato, solo tu)</span></div>
      <div class="grid2">
        <div><label>Referente</label><input id="c-person-${t.id}" value="${esc(adm.contact_person||'')}" placeholder="Es. Marco Rossi"></div>
        <div><label>Telefono</label><input id="c-phone-${t.id}" value="${esc(adm.contact_phone||'')}" placeholder="+41 …"></div>
        <div><label>Email</label><input id="c-email-${t.id}" value="${esc(adm.contact_email||'')}" placeholder="cliente@email.ch"></div>
        <div><label>Colore app</label><input id="c-accent-${t.id}" type="color" value="${esc(t.accent||'#34D399')}" style="height:40px;padding:4px"></div>
        <div><label>Canone CHF/mese</label><input id="c-price-${t.id}" type="number" min="0" step="1" value="${adm.plan_price!=null?adm.plan_price:''}" placeholder="59"></div>
        <div><label>Scadenza / rinnovo</label><input id="c-due-${t.id}" type="date" value="${adm.plan_due||''}"></div>
        <div><label>Stato pagamento</label><select id="c-pay-${t.id}">${opt('in_regola','In regola')}${opt('insoluto','Insoluto')}${opt('sospeso','Sospeso')}</select></div>
      </div>
      <div style="margin-top:10px"><label>Note (private)</label><input id="c-notes-${t.id}" value="${esc(adm.notes||'')}" placeholder="Promemoria, accordi, scadenze…"></div>
      <div class="row" style="margin-top:10px;align-items:center;gap:8px">
        <button class="sm pri" onclick="saveAdmin('${t.id}')">Salva gestione</button>
        <span class="ok" id="oka-${t.id}"></span>
      </div>
    </div>

    <div class="row" style="margin-top:12px;align-items:center;gap:8px">
      <span class="tiny">Posti dipendente (0 = illimitati)</span>
      <input type="number" min="0" id="posti-${t.id}" value="${t.max_employees||0}" style="max-width:90px;padding:6px 9px">
      <button class="sm" onclick="savePosti('${t.id}')">Salva posti</button>
      <span class="ok" id="okp-${t.id}"></span>
    </div>
    <div class="row" style="margin-top:12px">
      <a class="sm" style="text-decoration:none;display:inline-block" href="${APP_URL}" target="_blank">Apri app cliente ↗</a>
      <button class="sm" onclick="toggleActive('${t.id}',${t.active?'false':'true'})">${t.active?'Sospendi':'Riattiva'}</button>
      <button class="sm" style="border-color:var(--red);color:var(--red)" onclick="deleteTenant('${t.id}')">Elimina</button>
    </div>
    </div>
  </details>`;
}
function filterTenants(q){
  q=(q||'').trim().toLowerCase();
  let shown=0;
  document.querySelectorAll('#tlist .tenant').forEach(el=>{
    const hit=!q||(el.dataset.search||'').includes(q);
    el.style.display=hit?'':'none';
    if(hit)shown++;
  });
  const nr=document.getElementById('noresult');if(nr)nr.style.display=shown?'none':'block';
}
function copyEl(id){const e=document.getElementById(id);if(e){e.select?e.select():0;navigator.clipboard.writeText(e.value);}}
async function saveAdmin(id){
  const g=k=>document.getElementById(k+'-'+id);
  const row={
    tenant_id:id,
    contact_person:g('c-person').value.trim(),
    contact_email:g('c-email').value.trim(),
    contact_phone:g('c-phone').value.trim(),
    notes:g('c-notes').value.trim(),
    plan_price: g('c-price').value===''?null:parseFloat(g('c-price').value),
    plan_due: g('c-due').value||null,
    payment_status: g('c-pay').value,
    updated_at:new Date().toISOString()
  };
  const el=$('#oka-'+id);el.textContent='…';
  const{error:e1}=await sb.from('tenant_admin').upsert(row);
  const{error:e2}=await sb.from('tenants').update({accent:g('c-accent').value||'#34D399'}).eq('id',id);
  const err=e1||e2;
  el.textContent=err?('⚠ '+err.message):'✓ salvato';
  if(!err)setTimeout(()=>{const x=$('#oka-'+id);if(x)x.textContent='';},2000);
}
async function deleteTenant(id){
  const h=document.querySelector('#t-'+id+' .tname');
  const nm=h?h.textContent.trim():'questa azienda';
  if(!confirm('Eliminare «'+nm+'» e TUTTI i suoi dati (clienti, appuntamenti, dipendenti, note…)?\n\nÈ definitivo e non si può annullare.'))return;
  const{error}=await sb.from('tenants').delete().eq('id',id);
  if(error){alert('Errore: '+error.message);return;}
  viewDash();
}
function toggleMod(el){el.classList.toggle('on');}
async function saveMods(id){
  const on=[...document.querySelectorAll(`#t-${id} .chip.on`)].map(c=>c.dataset.m);
  const{error}=await sb.from('tenants').update({modules:on}).eq('id',id);
  $('#ok-'+id).textContent=error?('⚠ '+error.message):'✓ salvato';
  if(!error)setTimeout(()=>{const e=$('#ok-'+id);if(e)e.textContent='';},2000);
}
async function toggleActive(id,to){const{error}=await sb.from('tenants').update({active:to==='true'}).eq('id',id);if(!error)viewDash();else alert(error.message);}
async function savePosti(id){
  const raw=parseInt(document.getElementById('posti-'+id).value);const v=isNaN(raw)?4:Math.max(0,raw); // 0 = illimitati
  const{error}=await sb.from('tenants').update({max_employees:v}).eq('id',id);
  const el=document.getElementById('okp-'+id);
  el.textContent=error?('⚠ '+error.message):'✓ salvato';
  if(!error)setTimeout(()=>{el.textContent='';},2000);
}

function newTenantForm(){
  const chips=MODULES.map(m=>`<span class="chip ${m.lock||['cal','notes','clients'].includes(m.id)?'on':''} ${m.lock?'lock':''}" data-m="${m.id}" ${m.lock?'':`onclick="toggleMod(this)"`}>${esc(m.label)}</span>`).join('');
  return `<div class="card">
    <div class="paste-box">
      <label style="color:var(--ac)">📥 Incolla la configurazione del cliente</label>
      <div class="tiny" style="margin:4px 0 8px">Incolla il blocco che arriva dal configuratore (anche tutta la mail): compilo io il form. Poi controlli e premi Crea.</div>
      <textarea id="nt-paste" placeholder='{"azienda":"...","accento":"#...","moduli_base":[...],"moduli_extra":[...]}'></textarea>
      <button class="sm pri" style="margin-top:8px" onclick="loadConfig()">Compila il form ↓</button>
    </div>
    <div class="grid2">
      <div><label>Nome azienda</label><input id="nt-name" placeholder="Es. Rossi Riscaldamenti" oninput="$('#nt-slug').value=$('#nt-slug').dataset.t?$('#nt-slug').value:slugify(this.value)"></div>
      <div><label>Slug (codice breve)</label><input id="nt-slug" class="mono" placeholder="rossi-riscaldamenti" oninput="this.dataset.t=1"></div>
      <div><label>Nome del titolare</label><input id="nt-owner" placeholder="Es. Marco Rossi"></div>
      <div><label>Colore app</label><input id="nt-accent" type="color" value="#34D399" style="height:40px;padding:4px"></div>
      <div><label>Email referente</label><input id="nt-email" placeholder="cliente@email.ch"></div>
      <div><label>Telefono</label><input id="nt-phone" placeholder="+41 …"></div>
      <div><label>Posti dipendente (0 = illimitati)</label><input id="nt-posti" type="number" min="0" value="4"></div>
      <div><label>Logo (URL, facoltativo)</label><input id="nt-logo" placeholder="https://… o vuoto"></div>
    </div>
    <div style="margin-top:14px"><label>Moduli da attivare</label><div class="modchips" id="nt-mods">${chips}</div></div>
    <div class="err" id="nt-err"></div>
    <button class="pri" style="margin-top:6px" onclick="createTenant()">Crea azienda + genera codice</button>
    <div id="nt-result"></div>
  </div>`;
}
async function createTenant(){
  const name=$('#nt-name').value.trim(), slug=($('#nt-slug').value.trim()||slugify(name)), owner=$('#nt-owner').value.trim();
  const mods=[...document.querySelectorAll('#nt-mods .chip.on')].map(c=>c.dataset.m);
  const er=$('#nt-err');er.style.color='';er.textContent='';
  if(!name||!slug||!owner)return er.textContent='Nome azienda, slug e nome titolare sono obbligatori';
  const{data,error}=await sb.rpc('create_tenant',{p_name:name,p_slug:slug,p_modules:mods,p_owner_name:owner});
  if(error)return er.textContent=error.message.includes('duplicate')?'Slug già usato, scegline un altro':error.message;
  const tid=data&&data.tenant_id;
  const postiRaw=parseInt($('#nt-posti').value);const posti=isNaN(postiRaw)?4:Math.max(0,postiRaw); // 0 = illimitati
  if(tid){
    const upd={};
    const acc=$('#nt-accent')&&$('#nt-accent').value; if(acc)upd.accent=acc;
    const logo=$('#nt-logo')?$('#nt-logo').value.trim():''; if(logo)upd.logo=logo;
    if(posti!==4)upd.max_employees=posti;
    if(Object.keys(upd).length)await sb.from('tenants').update(upd).eq('id',tid);
    const email=$('#nt-email')?$('#nt-email').value.trim():'', phone=$('#nt-phone')?$('#nt-phone').value.trim():'';
    if(owner||email||phone)await sb.from('tenant_admin').upsert({tenant_id:tid,contact_person:owner,contact_email:email,contact_phone:phone,updated_at:new Date().toISOString()});
  }
  $('#nt-result').innerHTML=`<div class="card" style="margin-top:14px;border-color:var(--ac)">
    <h3 style="color:var(--ac)">✓ ${esc(name)} creata!</h3>
    <p class="muted" style="margin:8px 0">Dai al titolare <b>${esc(owner)}</b> il link dell'app e questo codice. Lui si registra e lo inserisce:</p>
    <div class="codebox"><span>${esc(data.invite_code)}</span><button class="sm" onclick="navigator.clipboard.writeText('${esc(data.invite_code)}')">copia</button></div>
    <p class="tiny" style="margin-top:8px">App: <a href="${APP_URL}" target="_blank">${esc(APP_URL)}</a> · il codice si usa una volta sola.</p>
  </div>`;
  ['nt-name','nt-slug','nt-owner','nt-email','nt-phone','nt-logo','nt-paste'].forEach(k=>{const e=$('#'+k);if(e)e.value='';});$('#nt-slug').dataset.t='';
  setTimeout(viewDash,4000);
}
function loadConfig(){
  const raw=($('#nt-paste').value||'').trim();
  const er=$('#nt-err');er.style.color='';er.textContent='';
  if(!raw){er.textContent='Incolla prima il blocco configurazione';return;}
  let c;
  try{const m=raw.match(/\{[\s\S]*\}/);c=JSON.parse(m?m[0]:raw);}
  catch(e){er.textContent='Configurazione non valida (JSON non leggibile)';return;}
  const name=c.azienda||c.nome||c.name||'';
  $('#nt-name').value=name;
  $('#nt-slug').value=c.slug||slugify(name);$('#nt-slug').dataset.t='1';
  $('#nt-owner').value=c.referente||c.titolare||c.owner||'';
  const set=(id,v)=>{const e=$('#'+id);if(e&&v!=null&&v!=='')e.value=v;};
  set('nt-email',c.email);
  set('nt-phone',c.telefono||c.phone);
  set('nt-accent',c.accento||c.accent);
  set('nt-logo',(c.logo&&c.logo!==true)?c.logo:'');
  const posti=c.dipendenti!=null?c.dipendenti:(c.posti!=null?c.posti:c.max_employees);
  if(posti!=null)set('nt-posti',posti);
  let mods=[];
  if(Array.isArray(c.modules))mods=c.modules;
  else if(Array.isArray(c.moduli))mods=c.moduli;
  else mods=[].concat(c.moduli_base||[],c.moduli_extra||[]);
  const want=new Set(mods);
  document.querySelectorAll('#nt-mods .chip').forEach(ch=>{if(ch.classList.contains('lock'))return;ch.classList.toggle('on',want.has(ch.dataset.m));});
  er.style.color='var(--ac)';er.textContent='✓ Form compilato dalla configurazione — controlla e premi «Crea azienda»';
}

/* ---------- BOOT ---------- */
async function boot(){
  if(DEMO){shell(`<div class="center"><div class="lbox card"><h3>Backend non configurato</h3><p class="muted" style="margin-top:8px">Compila <span class="mono">core/config.js</span> con URL e anon key del progetto Supabase.</p></div></div>`);return;}
  const{data:{session:s}}=await sb.auth.getSession();
  session=s;
  if(!session){viewLogin('login');return;}
  const{data:row}=await sb.from('super_admins').select('user_id').eq('user_id',session.user.id).maybeSingle();
  isAdmin=!!row;
  if(!isAdmin){viewClaim();return;}
  viewDash();
}
boot();
</script>
