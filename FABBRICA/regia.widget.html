<!-- ============================================================
     FABBRICA — WIDGET REGIA (banco interno, da renderizzare con show_widget di visualize)
     Linea di produzione animata: la config entra come "pezzo grezzo", viaggia sui nastri
     tra i 4 reparti che si accendono in sequenza, i moduli si agganciano dentro l'app in
     costruzione, la console scrive i passi; alla fine esce l'app pronta e parte sendPrompt()
     -> arriva a Claude come messaggio -> Claude esegue la catena vera (smista->assembla->registra->link).
     L'animazione e' la regia/teatro: il lavoro reale lo fa Claude dopo l'invio.
     Tema: usa le CSS var del host visualize (non e' un sito a se').
     ============================================================ -->
<style>
@keyframes fbBelt{to{background-position:18px 0}}
@keyframes fbPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fbBlink{50%{opacity:.2}}
@keyframes fbSpin{to{transform:rotate(360deg)}}
.fb-belt{background-image:repeating-linear-gradient(135deg,var(--color-border-secondary) 0 2px,transparent 2px 9px);animation:fbBelt .55s linear infinite}
.fb-pop{animation:fbPop .34s ease both}
.fb-blink{animation:fbBlink 1s ease-in-out infinite}
.fb-spin{animation:fbSpin 1.1s linear infinite;display:inline-block}
</style>
<div style="font-family:var(--font-sans);color:var(--color-text-primary);">

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:2px;">
    <div style="width:42px;height:42px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;color:var(--color-text-primary);font-size:22px;"><i class="ti ti-building-factory-2" aria-hidden="true"></i></div>
    <div style="flex:1;">
      <div style="font-size:11px;letter-spacing:1.5px;color:var(--color-text-tertiary);">BANCO DI REGIA · INTERNO</div>
      <h2 style="margin:1px 0 0;">Fabbrica Modula</h2>
    </div>
    <div id="fb-phase" style="font-size:12px;color:var(--color-text-tertiary);text-align:right;">in attesa di un ordine</div>
  </div>

  <!-- LINEA DI PRODUZIONE -->
  <div id="fb-line" style="position:relative;padding:14px 0 30px;margin:8px 0 2px;">
    <div id="fb-stations" style="display:flex;gap:8px;align-items:stretch;position:relative;z-index:1;"></div>
    <div id="fb-belt" class="fb-belt" style="position:absolute;left:2px;right:2px;bottom:14px;height:6px;border-radius:3px;"></div>
    <div id="fb-cart" style="position:absolute;bottom:7px;left:0;width:28px;height:28px;border-radius:var(--border-radius-md);background:var(--color-background-primary);border:1px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;opacity:0;transition:left .8s cubic-bezier(.5,.05,.3,1),opacity .3s;z-index:2;"><i class="ti ti-package" style="font-size:15px;color:var(--color-text-secondary);" aria-hidden="true"></i></div>
  </div>

  <!-- STABILIMENTO: console + app in costruzione -->
  <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:12px;margin:10px 0 4px;">
    <div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary);padding:10px 12px;min-height:150px;">
      <div style="font-size:10.5px;letter-spacing:1px;color:var(--color-text-tertiary);margin-bottom:6px;display:flex;align-items:center;gap:6px;"><i class="ti ti-terminal-2" aria-hidden="true"></i> CONSOLE DI LINEA</div>
      <div id="fb-log" style="font-family:var(--font-mono,monospace);font-size:11.5px;line-height:1.85;color:var(--color-text-secondary);"></div>
    </div>
    <div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);padding:0 0 10px;overflow:hidden;min-height:150px;">
      <div id="fb-brand" style="height:8px;background:var(--color-border-tertiary);transition:background .4s;"></div>
      <div style="padding:10px 12px 0;display:flex;align-items:center;gap:8px;">
        <span id="fb-dot" style="width:12px;height:12px;border-radius:4px;background:var(--color-border-secondary);transition:background .4s;display:inline-block;"></span>
        <span id="fb-appname" style="font-size:13.5px;font-weight:500;color:var(--color-text-tertiary);">app in attesa</span>
        <span id="fb-link" style="margin-left:auto;display:none;font-size:11px;padding:2px 9px;border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success);align-items:center;gap:4px;"><i class="ti ti-link" aria-hidden="true"></i>link pronto</span>
      </div>
      <div id="fb-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:6px;padding:10px 12px 0;"></div>
      <div id="fb-empty" style="padding:14px 12px;font-size:11.5px;color:var(--color-text-tertiary);">i moduli si agganciano qui durante il montaggio…</div>
    </div>
  </div>

  <!-- INPUT ORDINE -->
  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.1rem;margin-top:8px;">
    <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:7px;">Configurazione del cliente <span style="color:var(--color-text-tertiary);">— incolla il testo del configuratore o la riga JSON</span></label>
    <textarea id="fb-in" spellcheck="false" placeholder='{"azienda":"...","settore":"...","accento":"#...","moduli_extra":[...]}' style="width:100%;min-height:72px;box-sizing:border-box;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);font-family:var(--font-mono,monospace);font-size:12.5px;line-height:1.6;padding:11px 13px;resize:vertical;outline:none;"></textarea>
    <div style="display:flex;gap:8px;margin-top:11px;align-items:center;flex-wrap:wrap;">
      <button id="fb-analyze" style="font-size:13px;font-weight:500;padding:9px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;display:inline-flex;align-items:center;gap:6px;"><i class="ti ti-eye" aria-hidden="true"></i> Anteprima smistamento</button>
      <button id="fb-go" style="font-size:13px;font-weight:500;padding:9px 18px;border-radius:var(--border-radius-md);border:none;background:var(--color-text-info);color:var(--color-background-primary);cursor:pointer;display:inline-flex;align-items:center;gap:6px;"><i class="ti ti-player-play" aria-hidden="true"></i> Avvia in Fabbrica</button>
      <button id="fb-demo" style="font-size:12px;padding:9px 12px;border-radius:var(--border-radius-md);border:none;background:transparent;color:var(--color-text-tertiary);cursor:pointer;">esempio</button>
      <span id="fb-msg" style="font-size:12px;color:var(--color-text-tertiary);margin-left:auto;"></span>
    </div>
  </div>

  <div id="fb-plan" style="margin-top:14px;"></div>
</div>

<script>
(function(){
  var BASE=['hub','cal','notes','notif','clients','emps'];
  var PRONTI=['conti','man','sites','pellet','macchine','zone'];
  var ARRIVO=['prenota','magazzino','catalogo','fatture','documenti','report','fidelity','turni'];
  var NM={hub:'Hub',cal:'Calendario',notes:'Note',notif:'Notifiche',clients:'Clienti',emps:'Personale',conti:'Conti',man:'Manutenzioni',sites:'Cantieri',pellet:'Consegne',macchine:'Macchine',zone:'Zone',prenota:'Prenotazioni',magazzino:'Magazzino',catalogo:'Catalogo',fatture:'Fatture',documenti:'Documenti',report:'Report',fidelity:'Fidelity',turni:'Turni'};
  var MIC={hub:'ti-layout-dashboard',cal:'ti-calendar',notes:'ti-note',notif:'ti-bell',clients:'ti-users',emps:'ti-user',conti:'ti-receipt',man:'ti-tool',sites:'ti-building',pellet:'ti-truck-delivery',macchine:'ti-settings',zone:'ti-map-2',prenota:'ti-calendar-plus',magazzino:'ti-package',catalogo:'ti-book',fatture:'ti-file-invoice',documenti:'ti-files',report:'ti-chart-bar',fidelity:'ti-star',turni:'ti-clock-hour-4'};
  var STAGES=[{k:'dir',ic:'ti-compass',n:'Dirigenza',d:'smista'},{k:'asm',ic:'ti-tool',n:'Assemblaggio',d:'monta'},{k:'lab',ic:'ti-flask',n:'Laboratorio',d:'crea nuovi'},{k:'cnv',ic:'ti-refresh',n:'Conversione',d:'migra'}];
  var C=function(v){return 'var(--color-'+v+')';};
  var $=function(id){return document.getElementById(id);};
  var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var T=[];
  function clearTimers(){T.forEach(clearTimeout);T=[];}
  function at(ms,fn){T.push(setTimeout(fn,ms));}

  // ---- stazioni ----
  function buildStations(){
    $('fb-stations').innerHTML=STAGES.map(function(s){
      return '<div id="fb-st-'+s.k+'" style="flex:1;border:0.5px solid '+C('border-tertiary')+';border-radius:var(--border-radius-md);background:'+C('background-primary')+';padding:9px 8px 11px;transition:border-color .3s,background .3s,opacity .3s;text-align:center;">'
        +'<div style="display:flex;align-items:center;justify-content:center;gap:6px;">'
          +'<i id="fb-ic-'+s.k+'" class="ti '+s.ic+'" style="font-size:17px;color:'+C('text-tertiary')+';transition:color .3s;" aria-hidden="true"></i>'
          +'<span id="fb-dot-'+s.k+'" style="width:7px;height:7px;border-radius:50%;background:'+C('border-secondary')+';display:inline-block;transition:background .3s;"></span>'
        +'</div>'
        +'<div style="font-size:11.5px;font-weight:500;margin-top:5px;color:'+C('text-secondary')+';">'+s.n+'</div>'
        +'<div id="fb-sub-'+s.k+'" style="font-size:10px;color:'+C('text-tertiary')+';margin-top:1px;">'+s.d+'</div>'
      +'</div>';
    }).join('');
  }
  function setStation(k,state){
    var box=$('fb-st-'+k),ic=$('fb-ic-'+k),dot=$('fb-dot-'+k);
    if(!box)return;
    box.classList.remove('fb-blink');dot.className='';dot.style.cssText='width:7px;height:7px;border-radius:50%;display:inline-block;transition:background .3s;';
    if(state==='active'){box.style.borderColor=C('border-info');box.style.background=C('background-info');box.style.opacity='1';ic.style.color=C('text-info');dot.style.background=C('text-info');dot.classList.add('fb-blink');}
    else if(state==='done'){box.style.borderColor=C('border-success');box.style.background=C('background-primary');box.style.opacity='1';ic.style.color=C('text-success');dot.style.background=C('text-success');}
    else if(state==='warn'){box.style.borderColor=C('border-warning');box.style.background=C('background-warning');box.style.opacity='1';ic.style.color=C('text-warning');dot.style.background=C('text-warning');}
    else if(state==='skip'){box.style.borderColor=C('border-tertiary');box.style.background=C('background-primary');box.style.opacity='.45';ic.style.color=C('text-tertiary');dot.style.background=C('border-secondary');}
    else{box.style.borderColor=C('border-tertiary');box.style.background=C('background-primary');box.style.opacity='1';ic.style.color=C('text-tertiary');dot.style.background=C('border-secondary');}
  }
  function resetStations(){STAGES.forEach(function(s){setStation(s.k,'idle');});}

  function moveCart(k,working){
    var el=$('fb-st-'+k);if(!el)return;
    var pos=el.offsetLeft+el.offsetWidth/2;
    var cart=$('fb-cart');cart.style.opacity='1';cart.style.left=(pos-14)+'px';
    cart.innerHTML='<i class="ti '+(working?'ti-loader-2':'ti-package')+'" style="font-size:15px;color:'+C('text-info')+';" aria-hidden="true"></i>';
    if(working)cart.firstChild.classList.add('fb-spin');
  }
  function cartExit(){var cart=$('fb-cart');cart.style.left=($('fb-line').offsetWidth-10)+'px';cart.style.opacity='0';}

  // ---- console ----
  function logline(txt,kind){
    var col=kind==='ok'?C('text-success'):kind==='warn'?C('text-warning'):kind==='info'?C('text-info'):C('text-secondary');
    var box=$('fb-log');var d=document.createElement('div');
    d.style.cssText='opacity:0;transition:opacity .25s;color:'+col+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
    d.innerHTML='<span style="color:'+C('text-tertiary')+';">›</span> '+esc(txt);
    box.appendChild(d);requestAnimationFrame(function(){d.style.opacity='1';});
    while(box.childNodes.length>7)box.removeChild(box.firstChild);
  }

  // ---- app in costruzione ----
  function brick(id,promesso){
    var bg=promesso?'transparent':C('background-secondary');
    var bd=promesso?'1px dashed '+C('border-warning'):'0.5px solid '+C('border-tertiary');
    var fg=promesso?C('text-warning'):C('text-secondary');
    return '<div class="fb-pop" style="border:'+bd+';background:'+bg+';border-radius:var(--border-radius-md);padding:8px 4px 7px;text-align:center;">'
      +'<i class="ti '+(MIC[id]||'ti-box')+'" style="font-size:16px;color:'+fg+';" aria-hidden="true"></i>'
      +'<div style="font-size:9.5px;color:'+fg+';margin-top:3px;line-height:1.2;">'+esc(NM[id]||id)+'</div>'
      +(promesso?'<div style="font-size:8px;letter-spacing:.5px;color:'+C('text-warning')+';margin-top:1px;">PROMESSO</div>':'')
    +'</div>';
  }
  function addBrick(id,promesso){var e=$('fb-empty');if(e)e.style.display='none';var w=document.createElement('div');w.innerHTML=brick(id,promesso);$('fb-grid').appendChild(w.firstChild);}
  function resetApp(){$('fb-grid').innerHTML='';$('fb-empty').style.display='';$('fb-empty').textContent='i moduli si agganciano qui durante il montaggio…';$('fb-brand').style.background=C('border-tertiary');$('fb-dot').style.background=C('border-secondary');$('fb-appname').textContent='app in attesa';$('fb-appname').style.color=C('text-tertiary');$('fb-link').style.display='none';$('fb-log').innerHTML='';}

  // ---- parse / classifica ----
  function parse(){
    var m=$('fb-in').value.match(/\{[\s\S]*\}/); if(!m) throw new Error('Nessuna config JSON trovata.');
    var c=JSON.parse(m[0]);
    c.moduli_extra=Array.isArray(c.moduli_extra)?c.moduli_extra:[];
    c.azienda=c.azienda||''; c.settore=c.settore||'';
    c.accento=/^#?[0-9a-fA-F]{3,8}$/.test(String(c.accento||''))?(String(c.accento)[0]==='#'?c.accento:'#'+c.accento):'#6EE7B7';
    return c;
  }
  function classify(c){
    return {
      pronti:c.moduli_extra.filter(function(x){return PRONTI.indexOf(x)>=0;}),
      crea:c.moduli_extra.filter(function(x){return ARRIVO.indexOf(x)>=0;}),
      ignoti:c.moduli_extra.filter(function(x){return PRONTI.indexOf(x)<0&&ARRIVO.indexOf(x)<0;})
    };
  }
  function chip(id){return '<span style="font-family:var(--font-mono,monospace);font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary);">'+esc(NM[id]||id)+'</span>';}
  function plan(c,k){
    var split=k.crea.length>0;
    var lane=function(title,sub,col,ids,empty){
      return '<div style="flex:1;min-width:180px;border:0.5px solid '+C('border-tertiary')+';border-left:3px solid '+col+';border-radius:var(--border-radius-lg);background:var(--color-background-primary);padding:12px 14px;">'
        +'<div style="font-weight:500;font-size:13.5px;color:'+col+';">'+title+'</div>'
        +'<div style="font-size:11.5px;color:'+C('text-tertiary')+';margin:2px 0 8px;">'+sub+'</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px;">'+(ids.length?ids.map(chip).join(''):'<span style="font-size:12px;color:'+C('text-tertiary')+';">'+empty+'</span>')+'</div></div>';
    };
    $('fb-plan').innerHTML=
      '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 4px 14px;">'
        +'<div><div style="font-size:11px;color:'+C('text-tertiary')+';">AZIENDA</div><div style="font-size:16px;font-weight:500;">'+esc(c.azienda||'—')+'</div></div>'
        +'<div><div style="font-size:11px;color:'+C('text-tertiary')+';">SETTORE</div><div style="font-size:14px;">'+esc(c.settore||'—')+'</div></div>'
        +'<div><div style="font-size:11px;color:'+C('text-tertiary')+';">ACCENTO</div><div style="font-size:14px;display:flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:4px;background:'+esc(c.accento)+';display:inline-block;"></span>'+esc(c.accento)+'</div></div>'
        +'<div style="margin-left:auto;font-size:12px;color:'+(split?C('text-warning'):C('text-success'))+';">'+(split?'ordine SPLIT — parte in Laboratorio':'ordine diretto — tutto pronto')+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:12px;flex-wrap:wrap;">'
        +lane('Assemblaggio','monta subito (pronti)',C('text-info'),BASE.concat(k.pronti),'')
        +lane('Laboratorio',split?'da creare':'niente da creare',C('text-warning'),k.crea,'tutto già pronto')
      +'</div>'
      +(k.ignoti.length?'<div style="font-size:12px;color:'+C('text-warning')+';margin-top:8px;">Moduli non riconosciuti: '+k.ignoti.join(', ')+'</div>':'');
  }
  function analyze(){
    try{var c=parse();}catch(e){$('fb-msg').textContent='⚠ '+e.message;$('fb-msg').style.color=C('text-danger');return null;}
    $('fb-msg').textContent=''; plan(c,classify(c)); return c;
  }

  // ---- LINEA DI PRODUZIONE (animazione) ----
  function run(){
    var c=analyze(); if(!c)return;
    var k=classify(c);
    clearTimers(); resetStations(); resetApp();
    $('fb-go').disabled=true; $('fb-go').style.opacity='.55';
    $('fb-msg').textContent='';
    var jsonLine=JSON.stringify({azienda:c.azienda,settore:c.settore,accento:c.accento,moduli_extra:c.moduli_extra,generato:'configuratore'});
    var msg='creiamo l\'app per «'+(c.azienda||'azienda')+'» — esegui tutta la catena della Fabbrica (smista, assembla, registra) e dammi il link. Config: '+jsonLine;
    var setPhase=function(t){$('fb-phase').textContent=t;};
    var t=0,STEP=170;

    // 1 — DIRIGENZA
    at(t+=200,function(){setStation('dir','active');moveCart('dir',true);setPhase('Dirigenza · ricevo l\'ordine');logline('ordine ricevuto · «'+(c.azienda||'azienda')+'»','info');});
    at(t+=550,function(){logline('classifico '+c.moduli_extra.length+' moduli extra…');});
    at(t+=600,function(){
      logline('pronti: '+(k.pronti.length||0)+' · da creare: '+(k.crea.length||0),'ok');
      if(k.ignoti.length)logline('non riconosciuti: '+k.ignoti.join(', '),'warn');
      setStation('dir','done');
    });

    // 2 — ASSEMBLAGGIO
    at(t+=400,function(){setStation('asm','active');moveCart('asm',true);setPhase('Assemblaggio · monto l\'app');logline('copio i moduli base…');});
    var bt=t+=350;
    BASE.forEach(function(id,i){at(bt+i*150,function(){addBrick(id,false);});});
    t=bt+BASE.length*150;
    at(t+=200,function(){
      $('fb-brand').style.background=c.accento; $('fb-dot').style.background=c.accento;
      $('fb-appname').textContent=c.azienda||'App'; $('fb-appname').style.color=C('text-primary');
      logline('inietto BRAND + accento '+c.accento,'info');
    });
    if(k.pronti.length){
      at(t+=350,function(){logline('aggancio moduli pronti…');});
      var pt=t+=120; k.pronti.forEach(function(id,i){at(pt+i*170,function(){addBrick(id,false);});}); t=pt+k.pronti.length*170;
    }
    at(t+=300,function(){logline('poto app.html · VIEWS · dispatcher','ok');logline('modalità DEMO (Supabase segnaposto)','warn');setStation('asm','done');});

    // 3 — LABORATORIO
    at(t+=400,function(){moveCart('lab',k.crea.length>0);});
    if(k.crea.length){
      at(t,function(){setStation('lab','warn');setPhase('Laboratorio · moduli nuovi');logline(k.crea.map(function(x){return NM[x]||x;}).join(', ')+' → li costruisce Loris','warn');});
      var ct=t+=300; k.crea.forEach(function(id,i){at(ct+i*170,function(){addBrick(id,true);});}); t=ct+k.crea.length*170;
      at(t+=150,function(){logline('segnati PROMESSI in ORDINE + registro','warn');});
    } else {
      at(t,function(){setStation('lab','skip');logline('niente da creare · Laboratorio salta');});
    }

    // 4 — CONVERSIONE (solo migrazioni)
    at(t+=350,function(){setStation('cnv','skip');logline('nessun import · Conversione in standby');});

    // 5 — DIREZIONE: registro + QA
    at(t+=400,function(){setStation('dir','active');setPhase('Direzione · registro + QA');logline('registro.json ✓ · QA struttura ✓','ok');});
    at(t+=600,function(){setStation('dir','done');});

    // 6 — USCITA: app pronta
    at(t+=300,function(){
      cartExit();
      $('fb-link').style.display='inline-flex';
      $('fb-empty').style.display='none';
      setPhase('app pronta — invio in Fabbrica');
      logline('app assemblata · '+(BASE.length+k.pronti.length)+' moduli attivi','ok');
    });
    at(t+=700,function(){
      logline('invio l\'ordine a Claude per il build reale…','info');
      $('fb-msg').textContent='✓ inviato a Claude'; $('fb-msg').style.color=C('text-success');
      $('fb-go').disabled=false; $('fb-go').style.opacity='1';
      if(window.sendPrompt){sendPrompt(msg);} else {$('fb-msg').textContent='(anteprima: sendPrompt non disponibile qui)';$('fb-msg').style.color=C('text-tertiary');}
    });
  }

  $('fb-analyze').onclick=analyze;
  $('fb-demo').onclick=function(){$('fb-in').value='{"azienda":"Bar Centrale","settore":"ristorazione","accento":"#F472B6","moduli_extra":["conti","prenota","fidelity"]}';analyze();};
  $('fb-go').onclick=run;
  buildStations(); resetStations();
})();
</script>
